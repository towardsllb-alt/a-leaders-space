<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Leaders Space | Supermarket</title>
    <style>
        /* --- CSS Reset & Variables --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        :root {
            --primary-color: #1e3a8a; /* Deep Royal Blue */
            --secondary-color: #10b981; /* Fresh Green */
            --text-dark: #1f2937;
            --bg-light: #f3f4f6;
            --white: #ffffff;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-dark);
            line-height: 1.6;
        }

        /* --- Header & Navigation --- */
        header {
            background-color: var(--primary-color);
            color: var(--white);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .logo h1 {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .logo span {
            color: var(--secondary-color);
        }

        .cart-icon-container {
            position: relative;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.1);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            transition: background 0.3s;
        }

        .cart-icon-container:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        #cart-count {
            background-color: var(--secondary-color);
            color: var(--white);
            padding: 0.2rem 0.5rem;
            border-radius: 50%;
            font-size: 0.8rem;
            font-weight: bold;
            margin-left: 5px;
        }

        /* --- Hero Section --- */
        .hero {
            background: linear-gradient(rgba(30, 58, 138, 0.8), rgba(30, 58, 138, 0.9)), url('https://images.unsplash.com/photo-1542838132-92c53300491e?auto=format&fit=crop&w=1200&q=80') no-repeat center center/cover;
            color: var(--white);
            text-align: center;
            padding: 5rem 1rem;
        }

        .hero h2 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        /* --- Main Layout --- */
        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
            display: grid;
            grid-template-columns: 2.5fr 1fr;
            gap: 2rem;
        }

        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        /* --- Product Section --- */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 1.5rem;
        }

        .product-card {
            background-color: var(--white);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            transition: transform 0.3s, box-shadow 0.3s;
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .product-image {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background-color: #e5e7eb;
        }

        .product-details {
            padding: 1.2rem;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .product-name {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .product-desc {
            font-size: 0.85rem;
            color: #6b7280;
            margin-bottom: 1rem;
            flex-grow: 1;
        }

        .product-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
        }

        .product-price {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--primary-color);
        }

        .btn-add {
            background-color: var(--secondary-color);
            color: var(--white);
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }

        .btn-add:hover {
            background-color: #059669;
        }

        /* --- Sidebar (Cart & Checkout) --- */
        .sidebar {
            background-color: var(--white);
            padding: 1.5rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            height: fit-content;
            position: sticky;
            top: 100px;
        }

        .sidebar h3 {
            border-bottom: 2px solid var(--bg-light);
            padding-bottom: 0.5rem;
            margin-bottom: 1rem;
            color: var(--primary-color);
        }

        .cart-items-list {
            list-style: none;
            max-height: 240px;
            overflow-y: auto;
            margin-bottom: 1rem;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0;
            border-bottom: 1px dashed #e5e7eb;
            font-size: 0.9rem;
        }

        .cart-item-remove {
            color: #ef4444;
            cursor: pointer;
            font-weight: bold;
            margin-left: 10px;
        }

        .cart-total {
            display: flex;
            justify-content: space-between;
            font-weight: 700;
            font-size: 1.2rem;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 2px solid var(--bg-light);
        }

        /* --- Checkout Form --- */
        .checkout-form {
            margin-top: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 0.2rem;
            color: #4b5563;
        }

        .form-group input, .form-group select {
            padding: 0.5rem;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            outline: none;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: var(--primary-color);
        }

        .btn-checkout {
            background-color: var(--primary-color);
            color: var(--white);
            border: none;
            padding: 0.75rem;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 700;
            font-size: 1rem;
            margin-top: 0.5rem;
            transition: background 0.2s;
        }

        .btn-checkout:hover {
            background-color: #1d4ed8;
        }

        /* --- Footer --- */
        footer {
            background-color: var(--primary-color);
            color: var(--white);
            text-align: center;
            padding: 1.5rem;
            margin-top: 4rem;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <h1>A Leaders <span>Space</span></h1>
        </div>
        <div class="cart-icon-container" onclick="document.getElementById('delivery-name').focus();">
            🛒 Cart <span id="cart-count">0</span>
        </div>
    </header>

    <section class="hero">
        <h2>Fresh Groceries, Delivered to Your Doorstep</h2>
        <p>Premium Quality Supermarket Products Available Online</p>
    </section>

    <div class="container">
        
        <main>
            <h2 style="margin-bottom: 1.5rem; color: var(--primary-color);">Our Premium Products</h2>
            <div class="products-grid" id="products-container">
                </div>
        </main>

        <aside class="sidebar">
            <h3>Your Order Summary</h3>
            <ul class="cart-items-list" id="cart-items">
                <li style="color: #9ca3af; text-align: center; padding: 1rem 0;">Your cart is empty</li>
            </ul>
            
            <div class="cart-total">
                <span>Total:</span>
                <span id="total-price">$0.00</span>
            </div>

            <form class="checkout-form" id="checkout-form" onsubmit="handleCheckout(event)">
                <h3>Delivery Details</h3>
                
                <div class="form-group">
                    <label for="delivery-name">Full Name</label>
                    <input type="text" id="delivery-name" required placeholder="John Doe">
                </div>

                <div class="form-group">
                    <label for="delivery-address">Delivery Address</label>
                    <input type="text" id="delivery-address" required placeholder="123 Street Name, City">
                </div>

                <div class="form-group">
                    <label for="delivery-phone">Phone Number</label>
                    <input type="tel" id="delivery-phone" required placeholder="07XXXXXXXX">
                </div>

                <div class="form-group">
                    <label for="payment-method">Payment Option</label>
                    <select id="payment-method" required>
                        <option value="cod">Cash on Delivery (COD)</option>
                        <option value="card" disabled>Credit/Debit Card (Temporarily Offline)</option>
                    </select>
                </div>

                <button type="submit" class="btn-checkout">Place Order via COD</button>
            </form>
        </aside>

    </div>

    <footer>
        <p>&copy; 2026 A Leaders Space Supermarket. All Rights Reserved.</p>
    </footer>

    <script>
        // 1. Mock Supermarket Inventory Data (Easily expandable)
        const products = [
            {
                id: 1,
                name: "Organic Fresh Apples",
                description: "Crisp, sweet, and locally sourced organic red apples.",
                price: 4.99,
                image: "https://images.unsplash.com/photo-1560806887-1e4cd0b6cbd6?auto=format&fit=crop&w=400&q=80"
            },
            {
                id: 2,
                name: "Whole Grain Bread",
                description: "Freshly baked daily with high-fiber whole wheat grains.",
                price: 2.49,
                image: "https://images.unsplash.com/photo-1509440159596-0249088772ff?auto=format&fit=crop&w=400&q=80"
            },
            {
                id: 3,
                name: "Fresh Farm Milk (1L)",
                description: "Pasteurized, creamy full-cream dairy milk.",
                price: 1.89,
                image: "https://images.unsplash.com/photo-1563636619-e9143da7973b?auto=format&fit=crop&w=400&q=80"
            },
            {
                id: 4,
                name: "Premium Extra Virgin Olive Oil",
                description: "Cold-pressed olive oil perfect for cooking and salads.",
                price: 12.99,
                image: "https://images.unsplash.com/photo-1474979266404-7eaacbcd87c5?auto=format&fit=crop&w=400&q=80"
            },
            {
                id: 5,
                name: "Organic Brown Eggs (Pack of 12)",
                description: "Free-range, clean, and nutrient-dense grade A eggs.",
                price: 3.99,
                image: "https://images.unsplash.com/photo-1516448620398-c5f44bf9f441?auto=format&fit=crop&w=400&q=80"
            },
            {
                id: 6,
                name: "Premium Basmati Rice (5kg)",
                description: "Long-grain, aromatic aged basmati rice.",
                price: 15.49,
                image: "https://images.unsplash.com/photo-1586201375761-83865001e31c?auto=format&fit=crop&w=400&q=80"
            }
        ];

        // 2. Global State Variable for Shopping Cart Array
        let cart = [];

        // 3. Render Product Cards to the Screen
        function displayProducts() {
            const container = document.getElementById('products-container');
            container.innerHTML = products.map(product => `
                <div class="product-card">
                    <img src="${product.image}" alt="${product.name}" class="product-image">
                    <div class="product-details">
                        <div class="product-name">${product.name}</div>
                        <div class="product-desc">${product.description}</div>
                        <div class="product-meta">
                            <div class="product-price">$${product.price.toFixed(2)}</div>
                            <button class="btn-add" onclick="addToCart(${product.id})">Add to Cart</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // 4. Handle adding an item to the shopping cart array
        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            const existingItem = cart.find(item => item.id === productId);

            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            updateCartUI();
        }

        // 5. Handle removing a specific line item completely from the cart
        function removeFromCart(productId) {
            cart = cart.filter(item => item.id !== productId);
            updateCartUI();
        }

        // 6. Refresh and Calculate values on the UI Sidebar
        function updateCartUI() {
            // Update Icon count Badge
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cart-count').innerText = totalItems;

            // Render Cart Item Content list
            const cartItemsContainer = document.getElementById('cart-items');
            if (cart.length === 0) {
                cartItemsContainer.innerHTML = `<li style="color: #9ca3af; text-align: center; padding: 1rem 0;">Your cart is empty</li>`;
                document.getElementById('total-price').innerText = "$0.00";
                return;
            }

            let totalBill = 0;
            cartItemsContainer.innerHTML = cart.map(item => {
                const itemTotal = item.price * item.quantity;
                totalBill += itemTotal;
                return `
                    <li class="cart-item">
                        <div>
                            <strong>${item.name}</strong> <br>
                            <small>${item.quantity} x $${item.price.toFixed(2)}</small>
                        </div>
                        <div>
                            <span>$${itemTotal.toFixed(2)}</span>
                            <span class="cart-item-remove" onclick="removeFromCart(${item.id})">&times;</span>
                        </div>
                    </li>
                `;
            }).join('');

            // Display finalized total summary
            document.getElementById('total-price').innerText = `$${totalBill.toFixed(2)}`;
        }

        // 7. Process Order Form Submission (Checkout validation)
        function handleCheckout(event) {
            event.preventDefault(); // Stop page from refreshing on form submit

            if (cart.length === 0) {
                alert("Your shopping cart is empty! Please add products before placing an order.");
                return;
            }

            // Gather values entered by user
            const name = document.getElementById('delivery-name').value;
            const address = document.getElementById('delivery-address').value;
            const phone = document.getElementById('delivery-phone').value;
            const totalAmount = document.getElementById('total-price').innerText;

            // Display Confirmation to user
            alert(`🎉 Success! Thank you for shopping with A Leaders Space!\n\nOrder Summary:\nName: ${name}\nDelivery Address: ${address}\nPhone Contact: ${phone}\nTotal Bill: ${totalAmount}\nPayment Mode: Cash on Delivery (COD)\n\nOur team will call you shortly to confirm standard delivery timing!`);
            
            // Reset Application state back to empty
            cart = [];
            document.getElementById('checkout-form').reset();
            updateCartUI();
        }

        // Initialize application when browser window loads code
        window.onload = displayProducts;
    </script>
</body>
</html>
